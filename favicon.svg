<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="64" height="5" rx="3" fill="#D97706"/>
  <!-- B letter — bold -->
  <text x="18" y="44" font-family="Georgia,serif" font-weight="900" font-size="36" fill="#FFFFFF">B</text>
  <!-- COM small tag -->
  <rect x="34" y="36" width="22" height="13" rx="3" fill="#D97706"/>
  <text x="45" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#1E1B4B" letter-spacing="0.5">COM</text>
</svg>